[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

# index.html and the service worker must always be revalidated — if a
# browser (or Netlify's edge) caches a stale index.html, it can reference a
# hashed JS chunk from a previous build that no longer exists, causing the
# "Expected a JavaScript module but got text/html" blank-page error.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Hashed asset filenames change on every build, so they're safe to cache
# aggressively and immutably.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
